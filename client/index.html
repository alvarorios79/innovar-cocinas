<!doctype html>
<html lang="en">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>InnovarCitas - Gestor de Citas y Estimados</title>
    <meta name="description" content="Agenda citas y solicita estimados para cocinas integrales, closets, puertas y centros de TV en Pereira" />
    <meta name="theme-color" content="#14b8a6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="InnovarCitas" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <!-- THIS IS THE START OF A COMMENT BLOCK, BLOCK TO BE DELETED: Google Fonts here, example:

    <script>
      // Suppress Vite HMR errors immediately
      (function() {
        const originalError = console.error;
        console.error = function(...args) {
          const msg = String(args[0] || '');
          if (msg.includes('[vite]') || msg.includes('WebSocket') || msg.includes('failed to connect')) {
            return;
          }
          originalError.apply(console, args);
        };
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Intercept Vite HMR before it loads
      (function() {
        const originalFetch = window.fetch;
        window.fetch = function(...args) {
          const url = args[0];
          if (typeof url === 'string' && url.includes('@vite/client')) {
            return originalFetch.apply(this, args).then(response => {
              if (response.ok) {
                return response.text().then(text => {
                  const modifiedText = text.replace(
                    /protocol:\s*['"]wss?['"]/g,
                    "protocol: 'wss'"
                  ).replace(
                    /host:\s*['"]localhost['"]/g,
                    "host: 'invalid'"
                  );
                  return new Response(modifiedText, response);
                });
              }
              return response;
            });
          }
          return originalFetch.apply(this, args);
        };
        
        const originalError = console.error;
        console.error = function(...args) {
          const msg = String(args[0] || '');
          if (msg.includes('[vite]') || msg.includes('WebSocket')) {
            return;
          }
          originalError.apply(console, args);
        };
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // Registrar Service Worker para PWA
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('Service Worker registrado:', registration);
            })
            .catch(error => {
              console.log('Error al registrar Service Worker:', error);
            });
        });
      }
    </script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
