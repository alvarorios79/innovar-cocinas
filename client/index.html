<!doctype html>
<html lang="es" translate="no">

  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1" />
    <title>InnovarCocinas</title>
    <meta name="google" content="notranslate" />
    <meta name="description" content="Agenda citas y solicita estimados para cocinas integrales, closets, puertas y centros de TV en Pereira" />
    <meta name="theme-color" content="#14b8a6" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="apple-mobile-web-app-title" content="InnovarCitas" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png" />
    <link rel="apple-touch-icon" href="/icon-192.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />
    <script>
      // Suppress Vite HMR errors immediately
      (function() {
        const originalError = console.error;
        console.error = function(...args) {
          const msg = String(args[0] || '');
          if (msg.includes('[vite]') || msg.includes('WebSocket') || msg.includes('failed to connect')) {
            return;
          }
          originalError.apply(console, args);
        };
      })();
    </script>
  </head>

  <body>
    <div id="root"></div>
    <script>
      // Intercept Vite HMR before it loads
      (function() {
        const originalFetch = window.fetch;
        window.fetch = function(...args) {
          const url = args[0];
          if (typeof url === 'string' && url.includes('@vite/client')) {
            return originalFetch.apply(this, args).then(response => {
              if (response.ok) {
                return response.text().then(text => {
                  const modifiedText = text.replace(
                    /protocol:\s*['"]wss?['"]/g,
                    "protocol: 'wss'"
                  ).replace(
                    /host:\s*['"]localhost['"]/g,
                    "host: 'invalid'"
                  );
                  return new Response(modifiedText, response);
                });
              }
              return response;
            });
          }
          return originalFetch.apply(this, args);
        };
        
        const originalError = console.error;
        console.error = function(...args) {
          const msg = String(args[0] || '');
          if (msg.includes('[vite]') || msg.includes('WebSocket')) {
            return;
          }
          originalError.apply(console, args);
        };
      })();
    </script>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      // En desarrollo: desregistrar SWs para que Vite HMR funcione sin caché
      if ('serviceWorker' in navigator) {
        const isDev = location.hostname === 'localhost' || location.hostname === '127.0.0.1';
        if (isDev) {
          navigator.serviceWorker.getRegistrations().then(regs => {
            regs.forEach(r => r.unregister());
          });
          // Limpiar todas las caches del browser en dev
          if ('caches' in window) {
            caches.keys().then(keys => keys.forEach(k => caches.delete(k)));
          }
        } else {
          // Solo registrar SW en producción
          window.addEventListener('load', () => {
            navigator.serviceWorker.register('/sw.js')
              .then(r => console.log('SW registrado:', r))
              .catch(e => console.log('SW error:', e));
          });
        }
      }
    </script>
    <script
      defer
      src="%VITE_ANALYTICS_ENDPOINT%/umami"
      data-website-id="%VITE_ANALYTICS_WEBSITE_ID%"></script>
  </body>

</html>
